name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  # ── C Runtime (static musl binary) ────────────────────────
  c-runtime:
    name: C Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build erlkoenig_rt (static musl)
        run: make rt

      - name: Verify static binary
        run: |
          file build/release/erlkoenig_rt | grep -q "statically linked"
          ls -lh build/release/erlkoenig_rt

      - name: Upload C runtime
        uses: actions/upload-artifact@v4
        with:
          name: erlkoenig-rt-linux-amd64
          path: build/release/erlkoenig_rt

  # ── Erlang (compile + eunit + dialyzer) ──────────────────
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp27-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp27-${{ runner.os }}-

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: Dialyzer
        run: make dialyzer

  # ── Kernel Tests (privileged, root) ──────────────────────
  kernel:
    name: Kernel Tests (root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools check pkgconf

      - name: Build + run C runtime tests (unprivileged)
        run: |
          cmake -B build/test \
            -DERLKOENIG_BUILD_TESTS=ON \
            -DERLKOENIG_BUILD_DEMOS=OFF \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/test -j$(nproc)
          build/test/test/test_container_setup

      - name: Run C runtime tests (root)
        run: sudo build/test/test/test_container_setup

  # ── Elixir DSL ────────────────────────────────────────────
  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout erlkoenig_nft (DSL dependency)
        uses: actions/checkout@v4
        with:
          repository: iRaffnix/erlkoenig_nft
          path: erlkoenig_nft

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: DSL tests
        run: cd dsl && ERLKOENIG_NFT_DSL_PATH=$GITHUB_WORKSPACE/erlkoenig_nft/dsl mix test

      - name: Build escript
        run: ERLKOENIG_NFT_DSL_PATH=$GITHUB_WORKSPACE/erlkoenig_nft/dsl make dsl-escript

      - name: Verify escript
        run: dsl/erlkoenig-dsl --help || true

  # ── Release artifacts (for pre-release testing) ───────────
  #
  # Baut dieselben Artifacts wie release.yml, aber ohne GitHub Release.
  # Download: gh run download <run-id> -D /tmp/artifacts
  # Test:     sudo sh install.sh --local /tmp/artifacts
  release:
    name: Release artifacts
    runs-on: ubuntu-latest
    needs: [erlang, c-runtime]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools golang-go

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: Build C runtime
        run: make rt

      - name: Build Go demos
        run: make go-demos

      - name: Build Erlang + OTP release
        run: |
          rebar3 compile
          make release

      - name: Package artifacts
        run: |
          mkdir -p out
          cp build/release/erlkoenig_rt out/erlkoenig_rt-linux-amd64
          cp dist/erlkoenig-*.tar.gz out/
          cp dist/erlkoenig-dsl out/erlkoenig-dsl-linux-amd64
          mkdir -p static-demo-binaries
          cp build/release/demo/test-erlkoenig-* static-demo-binaries/
          cp build/release/echo-server static-demo-binaries/
          cp build/release/reverse-proxy static-demo-binaries/
          cp build/release/api-server static-demo-binaries/
          tar czf out/static-demo-binaries-linux-amd64.tar.gz -C . static-demo-binaries/
          ls -lh out/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: out/*
