name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  # ── Erlang (compile + eunit + dialyzer) ──────────────────
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: erlang-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            erlang-

      - name: CI gate
        run: make test dialyzer

  # ── Elixir DSL ────────────────────────────────────────────
  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: DSL tests
        run: cd dsl && mix test

      - name: Build escript
        run: make dsl-escript

      - name: Verify escript
        run: dsl/erlkoenig-dsl --help || true

  # ── Release artifacts (for pre-release testing) ───────────
  release:
    name: Release ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    needs: [erlang]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl
          - name: x86_64-musl
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-alpine-3.21.6
            deps: apk add --no-cache git make gcc g++ musl-dev curl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Install hex + rebar for mix
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Compile + release
        run: |
          rebar3 compile
          make release

      - name: Collect artifact
        run: |
          mkdir -p out
          cp dist/erlkoenig-*.tar.gz out/erlkoenig-${{ matrix.target.name }}.tar.gz
          ls -lh out/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz
