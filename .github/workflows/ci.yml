name: CI

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  # ── C Runtime (static musl binary) ────────────────────────
  c-runtime:
    name: C Runtime
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build erlkoenig_rt (static musl)
        run: make rt

      - name: Verify static binary
        run: |
          file build/release/erlkoenig_rt | grep -q "statically linked"
          ls -lh build/release/erlkoenig_rt

      - name: Upload C runtime
        uses: actions/upload-artifact@v4
        with:
          name: erlkoenig-rt-linux-amd64
          path: build/release/erlkoenig_rt

  # ── Erlang (compile + eunit + dialyzer) ──────────────────
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: erlang-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            erlang-

      - name: CI gate
        run: make test dialyzer

  # ── Kernel Tests (privileged, root) ──────────────────────
  kernel:
    name: Kernel Tests (root)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools check pkgconf

      - name: Build + run C runtime tests (unprivileged)
        run: |
          cmake -B build/test \
            -DERLKOENIG_BUILD_TESTS=ON \
            -DERLKOENIG_BUILD_DEMOS=OFF \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/test -j$(nproc)
          build/test/test/test_container_setup

      - name: Run C runtime tests (root)
        run: sudo build/test/test/test_container_setup

  # ── Elixir DSL ────────────────────────────────────────────
  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout erlkoenig_nft (DSL dependency)
        uses: actions/checkout@v4
        with:
          repository: iRaffnix/erlkoenig_nft
          path: erlkoenig_nft

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: DSL tests
        run: cd dsl && ERLKOENIG_NFT_DSL_PATH=$GITHUB_WORKSPACE/erlkoenig_nft/dsl mix test

      - name: Build escript
        run: ERLKOENIG_NFT_DSL_PATH=$GITHUB_WORKSPACE/erlkoenig_nft/dsl make dsl-escript

      - name: Verify escript
        run: dsl/erlkoenig-dsl --help || true

  # ── Release artifacts (for pre-release testing) ───────────
  #
  # Baut dieselben Artifacts wie release.yml, aber ohne GitHub Release.
  # Download: gh run download <run-id> -D /tmp/artifacts
  # Test:     sudo sh install.sh --local /tmp/artifacts
  release:
    name: Release ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    needs: [erlang, c-runtime]
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl
          - name: x86_64-musl
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-alpine-3.21.6
            deps: apk add --no-cache git make gcc g++ musl-dev curl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Compile + release
        run: |
          rebar3 compile
          make release

      - name: Collect artifact
        run: |
          mkdir -p out
          cp dist/erlkoenig-*.tar.gz out/erlkoenig-${{ matrix.target.name }}.tar.gz
          ls -lh out/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz
