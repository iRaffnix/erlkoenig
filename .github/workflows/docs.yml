name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'dsl/lib/**'
      - 'dsl/mix.exs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Build docs
        working-directory: dsl
        run: |
          mix local.hex --force
          mix deps.get
          mix docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dsl/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
