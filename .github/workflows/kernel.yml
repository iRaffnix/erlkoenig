name: Kernel Tests

# Privileged tests — need root for namespaces, cgroups, mounts.
# Run on pushes to main and manual trigger only (not on every PR).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── C Runtime Unit Tests (libcheck, sudo) ─────────────────
  c-runtime-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools check pkgconf

      - name: Build test binary
        run: |
          cmake -B build/test \
            -DERLKOENIG_BUILD_TESTS=ON \
            -DERLKOENIG_BUILD_DEMOS=OFF \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/test -j$(nproc)

      - name: Run unprivileged tests
        run: build/test/test/test_container_setup

      - name: Run all tests (with root)
        run: sudo build/test/test/test_container_setup

  # ── Integration Tests (full stack, sudo) ───────────────────
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools golang-go nftables

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      - name: Build C runtime + demos
        run: make rt

      - name: Build Erlang
        run: rebar3 compile

      - name: Build DSL escript
        run: make dsl-escript

      - name: Run integration tests
        run: |
          erlc -o integration-tests integration-tests/test_helper.erl
          sudo -E bash integration-tests/run_all.sh
