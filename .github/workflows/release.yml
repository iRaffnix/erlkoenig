name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Erlang release (container matrix) ──────────────────────
  #
  # Built inside pinned container images to control glibc and
  # OpenSSL versions. ERTS is included in the release tarball.
  #
  # C-Runtime (erlkoenig_rt) is maintained in a separate repository
  # per ADR 0008 and installed by install.sh at deploy time.
  erlang-release:
    name: Erlang release (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-linux
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl bash openssl
          - name: x86_64-musl
            runner: ubuntu-22.04
            image: hexpm/elixir:1.18.4-erlang-28.4.1-alpine-3.21.6
            deps: apk add --no-cache git make gcc g++ musl-dev curl bash openssl
          - name: aarch64-linux
            runner: ubuntu-22.04-arm
            image: hexpm/elixir:1.18.4-erlang-28.4.1-debian-bookworm-20260316-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl bash openssl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Verify toolchain
        run: |
          erl -noshell -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt().'
          rebar3 version

      - name: Generate PKI test fixtures
        run: bash apps/erlkoenig/test/fixtures/generate.sh

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: Dialyzer
        run: make dialyzer

      - name: Build release
        run: make release

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp dist/erlkoenig-*.tar.gz out/erlkoenig-${{ github.ref_name }}-${{ matrix.target.name }}.tar.gz
          ls -lh out/

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*

  # ── GitHub Release ─────────────────────────────────────────
  publish:
    needs: [erlang-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - uses: actions/checkout@v4

      - name: Prepare release files
        run: |
          mkdir -p release
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort
          find artifacts -name 'erlkoenig-*.tar.gz' -exec cp {} release/ \;
          cp install.sh release/install.sh
          echo "=== Release files ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
