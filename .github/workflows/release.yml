name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools golang-go

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'
          rebar3-version: '3.24'

      # ── Build everything ──────────────────────────────────
      - name: Build C runtime (static musl)
        run: make rt

      - name: Build Go demos (static)
        run: make go-demos

      - name: Build Erlang + OTP release
        run: |
          rebar3 compile
          make release

      # ── Run tests before release ──────────────────────────
      - name: EUnit
        run: rebar3 eunit

      - name: Dialyzer
        run: make dialyzer

      - name: DSL tests
        run: cd dsl && mix test

      # ── Verify artifacts ──────────────────────────────────
      - name: Verify static binaries
        run: |
          echo "=== erlkoenig_rt ==="
          file build/release/erlkoenig_rt | grep -q "statically linked"
          ls -lh build/release/erlkoenig_rt
          echo ""
          echo "=== C demo binaries ==="
          ls -lh build/release/demo/
          echo ""
          echo "=== Go demo binaries ==="
          ls -lh build/release/echo-server build/release/reverse-proxy build/release/api-server
          echo ""
          echo "=== dist/ ==="
          ls -lh dist/

      # ── Package static-demo-binaries ───────────────────────
      - name: Package static-demo-binaries
        run: |
          mkdir -p static-demo-binaries
          cp build/release/demo/test-erlkoenig-* static-demo-binaries/
          cp build/release/echo-server static-demo-binaries/
          cp build/release/reverse-proxy static-demo-binaries/
          cp build/release/api-server static-demo-binaries/
          tar czf dist/static-demo-binaries-linux-amd64.tar.gz -C . static-demo-binaries/
          echo "=== static-demo-binaries ==="
          ls -lh static-demo-binaries/
          echo ""
          echo "Archive: $(ls -lh dist/static-demo-binaries-linux-amd64.tar.gz | awk '{print $5}')"

      # ── Upload artifacts ──────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: |
            build/release/erlkoenig_rt
            dist/erlkoenig-*.tar.gz
            dist/erlkoenig-dsl
            dist/static-demo-binaries-linux-amd64.tar.gz

  # ── GitHub Release ────────────────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-linux-amd64
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/build/release/erlkoenig_rt release/erlkoenig_rt-linux-amd64
          cp artifacts/dist/erlkoenig-*.tar.gz release/
          cp artifacts/dist/erlkoenig-dsl release/erlkoenig-dsl-linux-amd64
          cp artifacts/dist/static-demo-binaries-linux-amd64.tar.gz release/
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
